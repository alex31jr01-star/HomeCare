<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Acesso - HomeCare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #3498DB, #BDC3C7);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }

        .form-title {
            font-size: 1.8rem;
            color: #3498DB;
            margin-bottom: 10px;
            text-align: center;
        }

        .form-subtitle {
            color: #7F8C8D;
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 500;
            color: #2C3E50;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498DB;
        }

        .btn-register {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #BDC3C7;
            color: #2C3E50;
            margin-top: 10px;
        }

        .btn-register:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #3498DB;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: 400;
            font-size: 0.9rem;
        }

        .alert-box {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-box.error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
            display: block;
        }

        .alert-box.success {
            background: #dcfce7;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 class="form-title">Formulário de Acesso</h1>
        <p class="form-subtitle">Preencha o formulário para solicitar acesso</p>
        
        <div id="alertBox" class="alert-box"></div>
        
        <form class="auth-form" onsubmit="event.preventDefault(); validarFormularioAcesso();">
            <div class="form-group">
                <label for="formAcessoName">Nome Completo *</label>
                <input type="text" id="formAcessoName" placeholder="Seu nome completo" required>
            </div>
            
            <div class="form-group">
                <label for="formAcessoBirthdate">Data de Nascimento *</label>
                <input type="date" id="formAcessoBirthdate" required>
            </div>
            
            <div class="form-group">
                <label for="formAcessoCPF">CPF *</label>
                <input type="text" id="formAcessoCPF" placeholder="000.000.000-00" maxlength="14" required>
            </div>
            
            <div class="form-group">
                <label for="formAcessoAddress">Endereço *</label>
                <input type="text" id="formAcessoAddress" placeholder="Rua, número, bairro, cidade, CEP" required>
            </div>
            
            <div class="form-group">
                <label for="formAcessoEmail">Gmail (E-mail) *</label>
                <input type="email" id="formAcessoEmail" placeholder="seuemail@gmail.com" required>
            </div>
            
            <div class="form-group">
                <label for="formAcessoPassword">Senha *</label>
                <input type="password" id="formAcessoPassword" placeholder="Crie uma senha" required>
            </div>
            
            <div class="form-group">
                <label for="formAcessoConfirmPassword">Confirmar Senha *</label>
                <input type="password" id="formAcessoConfirmPassword" placeholder="Confirme sua senha" required>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="formAcessoTerms" required>
                <label for="formAcessoTerms">Eu aceito os Termos de Uso e Política de Privacidade</label>
            </div>
            
            <button type="submit" class="btn-register">Confirmar Formulário de Acesso</button>
        </form>
    </div>
    
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Form submit now uses shared validarAcesso()
            const form = document.querySelector('.auth-form');
            if (form) {
                form.onsubmit = (e) => {
                    e.preventDefault();
                    validarAcesso();
                };
            }
        });
    </script>
</body>
</html>
