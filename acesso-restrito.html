<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - HomeCare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #3498DB, #BDC3C7);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }

        .form-title {
            font-size: 1.8rem;
            color: #3498DB;
            margin-bottom: 10px;
            text-align: center;
        }

        .form-subtitle {
            color: #7F8C8D;
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 500;
            color: #2C3E50;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498DB;
        }

        .btn-register {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #BDC3C7;
            color: #2C3E50;
            margin-top: 10px;
        }

        .btn-register:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #3498DB;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: 400;
            font-size: 0.9rem;
        }

        .alert-box {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-box.error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
            display: block;
        }

        .alert-box.success {
            background: #dcfce7;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 class="form-title">Cadastro de Acesso</h1>
        <p class="form-subtitle">Preencha seus dados para continuar</p>
        
        <div id="alertBox" class="alert-box"></div>
        
        <form class="auth-form" onsubmit="event.preventDefault(); validarAcesso();">
            <div class="form-group">
                <label for="accessName">Nome Completo *</label>
                <input type="text" id="accessName" placeholder="Seu nome completo" required>
            </div>
            
            <div class="form-group">
                <label for="accessBirthdate">Data de Nascimento *</label>
                <input type="date" id="accessBirthdate" required>
            </div>
            
            <div class="form-group">
                <label for="accessCPF">CPF *</label>
                <input type="text" id="accessCPF" placeholder="000.000.000-00" maxlength="14" required>
            </div>
            
            <div class="form-group">
                <label for="accessAddress">Endereço *</label>
                <input type="text" id="accessAddress" placeholder="Rua, número, bairro, cidade, CEP" required>
            </div>
            
            <div class="form-group">
                <label for="accessEmail">Gmail (E-mail) *</label>
                <input type="email" id="accessEmail" placeholder="seuemail@gmail.com" required>
            </div>
            
            <div class="form-group">
                <label for="accessPassword">Senha *</label>
                <input type="password" id="accessPassword" placeholder="Crie uma senha" required>
            </div>
            
            <div class="form-group">
                <label for="accessConfirmPassword">Confirmar Senha *</label>
                <input type="password" id="accessConfirmPassword" placeholder="Confirme sua senha" required>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="accessTerms" required>
                <label for="accessTerms">Eu aceito os Termos de Uso e Política de Privacidade</label>
            </div>
            
            <button type="submit" class="btn-register">Confirmar Acesso</button>
        </form>
    </div>
    
    <script>
        // Função de máscara de CPF
        function mascaraCPF(input) {
            let valor = input.value.replace(/\D/g, '');
            
            if (valor.length > 11) {
                valor = valor.substring(0, 11);
            }
            
            if (valor.length <= 3) {
                input.value = valor;
            } else if (valor.length <= 6) {
                input.value = valor.substring(0, 3) + '.' + valor.substring(3);
            } else if (valor.length <= 9) {
                input.value = valor.substring(0, 3) + '.' + valor.substring(3, 6) + '.' + valor.substring(6);
            } else {
                input.value = valor.substring(0, 3) + '.' + valor.substring(3, 6) + '.' + valor.substring(6, 9) + '-' + valor.substring(9);
            }
        }

        // Adicionar máscara de CPF ao campo
        document.addEventListener('DOMContentLoaded', function() {
            const cpfInput = document.getElementById('accessCPF');
            if (cpfInput) {
                cpfInput.addEventListener('input', function() {
                    mascaraCPF(this);
                });
            }
        });

        // Função para mostrar alertas
        function mostrarAlerta(mensagem, tipo) {
            const alertBox = document.getElementById('alertBox');
            if (alertBox) {
                alertBox.textContent = mensagem;
                alertBox.className = 'alert-box ' + tipo;
            }
        }

        // Função para validar o formulário de acesso restrito
        function validarAcesso() {
            const nome = document.getElementById('accessName').value.trim();
            const dataNascimento = document.getElementById('accessBirthdate').value.trim();
            const cpf = document.getElementById('accessCPF').value.trim();
            const endereco = document.getElementById('accessAddress').value.trim();
            const email = document.getElementById('accessEmail').value.trim();
            const senha = document.getElementById('accessPassword').value;
            const confirmSenha = document.getElementById('accessConfirmPassword').value;
            const termos = document.getElementById('accessTerms').checked;
            
            // Validar campos obrigatórios
            if (!nome || !dataNascimento || !cpf || !endereco || !email || !senha || !confirmSenha) {
                mostrarAlerta('Por favor, preencha todos os campos obrigatórios.', 'error');
                return;
            }
            
            // Validar CPF (deve ter 11 dígitos)
            const cpfNumerico = cpf.replace(/\D/g, '');
            if (cpfNumerico.length !== 11) {
                mostrarAlerta('CPF inválido! Deve conter 11 dígitos.', 'error');
                return;
            }
            
            // Validar formato de e-mail
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                mostrarAlerta('Por favor, insira um e-mail válido.', 'error');
                return;
            }
            
            // Validar senhas
            if (senha !== confirmSenha) {
                mostrarAlerta('As senhas não coincidem!', 'error');
                return;
            }
            
            // Validar senha mínima
            if (senha.length < 6) {
                mostrarAlerta('A senha deve ter pelo menos 6 caracteres.', 'error');
                return;
            }
            
            // Validar maior de idade
            const hoje = new Date();
            const nasc = new Date(dataNascimento);
            let idade = hoje.getFullYear() - nasc.getFullYear();
            const mes = hoje.getMonth() - nasc.getMonth();
            if (mes < 0 || (mes === 0 && hoje.getDate() < nasc.getDate())) {
                idade--;
            }
            
            if (idade < 18) {
                mostrarAlerta('Você deve ser maior de 18 anos para acessar o site.', 'error');
                return;
            }
            
            // Validar termos
            if (!termos) {
                mostrarAlerta('Você deve aceitar os Termos de Uso e Política de Privacidade.', 'error');
                return;
            }
            
            // Criar objeto do usuário
            const usuario = {
                nome: nome,
                dataNascimento: dataNascimento,
                cpf: cpf,
                endereco: endereco,
                email: email,
                acessoLiberado: true,
                dataCadastro: new Date().toISOString()
            };
            
            // Salvar no localStorage
            localStorage.setItem('usuarioAcessoHomeCare', JSON.stringify(usuario));
            
            // Redirecionar para a página inicial
            alert('Acesso liberado! Bem-vindo ao HomeCare.');
            window.location.href = 'index.html';
        }

        console.log('Página de acesso restrito carregada!');
    </script>
</body>
</html>
